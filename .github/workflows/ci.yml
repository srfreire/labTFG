name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so a fast follow-up commit doesn't
# wait behind a stale build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint + format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install ruff
        run: uv tool install ruff

      - name: ruff check (repo root)
        run: uv tool run ruff check .

      - name: ruff format --check (repo root)
        run: uv tool run ruff format --check .

  tests-shared:
    name: Tests - shared (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps
        working-directory: shared
        run: uv sync --frozen --all-extras --dev

      - name: pytest (skip integration / e2e / real_llm)
        working-directory: shared
        run: uv run pytest -q -m "not integration and not real_llm and not e2e"

  tests-phase1:
    name: Tests - phase1 (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps
        working-directory: phase1-pablo
        run: uv sync --frozen --all-extras --dev

      - name: pytest (skip integration / e2e / real_llm)
        working-directory: phase1-pablo
        run: uv run pytest -q -m "not integration and not real_llm and not e2e"

  tests-phase2:
    name: Tests - phase2 (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps
        working-directory: phase2-juan
        run: uv sync --frozen --all-extras --dev

      - name: pytest (skip integration / e2e / real_llm)
        working-directory: phase2-juan
        run: uv run pytest -q -m "not integration and not real_llm and not e2e"
