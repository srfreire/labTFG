# Full-pipeline suite: drives one topic through every stage —
# research → formalize → reason → build — and verifies that the
# generated DecisionModel is correct, not just that slugs propagated.
#
# Expensive: budget cap $30 per suite. Use sparingly (regression suite).
name: full-pipeline
stages: [research, formalize, reason, build]
env_spec: evals/fixtures/env_spec_grid_10x10.json
reset_kg_before: true

setup:
  - kind: seed_canonical_paradigms
    args: {}

topics:
  - text: "Grid-world foraging under reward uncertainty: compare reinforcement learning and optimal foraging decision strategies for an agent that must choose movement actions from local perception and update from rewards."
    expect:
      research:
        - paradigm: reinforcement-learning
        - paradigm: optimal-foraging-theory
        # Researcher should reuse the seeded canonical, not mint a new one.
        - paradigm_reused: reinforcement-learning
      formalize:
        - has_formulation: reinforcement-learning
        - has_formulation: optimal-foraging-theory
      build:
        # Substring check on the generated module's source (cheap
        # passthrough — confirms the build stage produced something
        # tagged with the right paradigm).
        - module_imports: q-learning
        # Functional check: the generated DecisionModel must actually
        # answer `decide(perception) -> Action` without crashing. This
        # is the predicate the suite was missing — `module_imports`
        # alone proves nothing about correctness.
        - decide_returns_action:
            spec_id: q-learning
            perception:
              x: 0
              y: 0
              grid_width: 10
              grid_height: 10
              step: 0
              resources:
                food: []
              last_action_result: null
        - module_imports: foraging
        - decide_returns_action:
            spec_id: foraging
            perception:
              x: 0
              y: 0
              grid_width: 10
              grid_height: 10
              step: 0
              resources:
                food: []
              last_action_result: null

approve:
  paradigms:
    - reinforcement-learning
    - optimal-foraging-theory
  max_paradigms: 2
  max_formulations_per_paradigm: 2

budget:
  max_usd_total: 30.00
