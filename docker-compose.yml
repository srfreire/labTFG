services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labtfg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labtfg}
      POSTGRES_DB: ${POSTGRES_DB:-labtfg}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labtfg} -d ${POSTGRES_DB:-labtfg}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-labtfg00}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      RETENTION_EVAL_DAYS: ${RETENTION_EVAL_DAYS:-30}
      RETENTION_PROD_DAYS: ${RETENTION_PROD_DAYS:-365}
    # Per-prefix lifecycle (memory-refactor P3-003 / phase-3 R3):
    # eval-run artefacts expire after RETENTION_EVAL_DAYS, prod after
    # RETENTION_PROD_DAYS. Existing keys outside these prefixes are
    # untouched. The `mc ilm import` call replaces the bucket's full
    # lifecycle config with the two named rules below, so re-running the
    # init container is idempotent (no duplicate rules accumulate).
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-labtfg} &&
      printf '{\"Rules\":[{\"ID\":\"expire-eval-runs\",\"Status\":\"Enabled\",\"Filter\":{\"Prefix\":\"runs/eval/\"},\"Expiration\":{\"Days\":%s}},{\"ID\":\"expire-prod-runs\",\"Status\":\"Enabled\",\"Filter\":{\"Prefix\":\"runs/prod/\"},\"Expiration\":{\"Days\":%s}}]}' $${RETENTION_EVAL_DAYS} $${RETENTION_PROD_DAYS} | mc ilm import local/${MINIO_BUCKET:-labtfg} &&
      echo 'Bucket + lifecycle ready'
      "
    restart: "no"

  phase1-server:
    build:
      context: .
      dockerfile: phase1-pablo/Dockerfile
    ports:
      - "8001:8001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-labtfg}
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-labtfg}:${POSTGRES_PASSWORD:-labtfg}@postgres:5432/${POSTGRES_DB:-labtfg}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-labtfg00}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  phase2-server:
    build:
      context: .
      dockerfile: phase2-juan/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - phase2-juan/.env
    environment:
      # ANTHROPIC_API_KEY / ANTHROPIC_BASE_URL / OPENROUTER_API_KEY come
      # from env_file. Don't redeclare them here — `environment` wins over
      # `env_file`, and an empty ${VAR:-} from the host shell would clobber
      # the real value loaded from the .env.
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-labtfg}
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-labtfg}:${POSTGRES_PASSWORD:-labtfg}@postgres:5432/${POSTGRES_DB:-labtfg}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-labtfg00}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  web:
    build:
      context: phase2-juan/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - phase2-server

volumes:
  pgdata:
  miniodata:
  neo4jdata:
  qdrantdata:
